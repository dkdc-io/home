name: Check

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: check-${{ runner.os }}-
      - run: bin/setup
      - run: bin/check
